name: Déploiement Dys-Play sur Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur dys-play.net
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Déploiement via SFTP (lftp mirror)
        env:
          HOST: ${{ secrets.INFOMANIAK_HOST }}
          USER: ${{ secrets.INFOMANIAK_USER }}
          PASS: ${{ secrets.INFOMANIAK_PASSWORD }}
          REMOTE: ${{ secrets.INFOMANIAK_REMOTE_PATH }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:timeout 30;
            open -u $USER,$PASS sftp://$HOST;
            mirror --reverse --delete --verbose \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.gitignore$ \
              --exclude ^README\.md$ \
              --exclude ^libs/README\.md$ \
              --exclude ^fonts/README\.md$ \
              --exclude ^\.htaccess$ \
              --exclude ^\.user\.ini$ \
              --exclude ^\.infomaniak \
              ./ $REMOTE;
            quit;
          "
          echo "Déploiement terminé"
