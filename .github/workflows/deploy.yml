name: Déploiement Dys-Play sur Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur dys-play.net
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Déploiement via SFTP (lftp mirror)
        env:
          HOST: ${{ secrets.INFOMANIAK_HOST }}
          USER: ${{ secrets.INFOMANIAK_USER }}
          PASS: ${{ secrets.INFOMANIAK_PASSWORD }}
          REMOTE: ${{ secrets.INFOMANIAK_REMOTE_PATH }}
        run: |
          # Force permissions 644 sur tous les fichiers avant upload pour
          # qu'Apache (user différent du SFTP) puisse les lire côté prod.
          chmod -R a+r .
          find . -type f -not -path "./.git/*" -exec chmod 644 {} \;
          find . -type d -not -path "./.git/*" -exec chmod 755 {} \;

          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 5;
            set net:timeout 60;
            set mirror:parallel-transfer-count 1;
            open -u $USER,$PASS sftp://$HOST;
            mirror --reverse --delete --verbose \
              --allow-chown \
              --allow-suid \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.gitignore$ \
              --exclude ^README\.md$ \
              --exclude ^libs/README\.md$ \
              --exclude ^fonts/README\.md$ \
              --exclude ^\.user\.ini$ \
              --exclude ^\.infomaniak \
              ./ $REMOTE;
            echo '--- Contenu remote icons/ ---';
            cls -la $REMOTE/icons/;
            echo '--- Upload explicite par sécurité ---';
            lcd icons;
            cd $REMOTE/icons;
            mput -O . *.png *.svg;
            chmod 644 *.png *.svg;
            echo '--- Contenu remote icons/ après chmod ---';
            cls -la;
            quit;
          "
          echo "Déploiement terminé"
