name: Déploiement Dys-Play sur Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur dys-play.net
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Déploiement via SFTP (lftp mirror)
        env:
          HOST: ${{ secrets.INFOMANIAK_HOST }}
          USER: ${{ secrets.INFOMANIAK_USER }}
          PASS: ${{ secrets.INFOMANIAK_PASSWORD }}
          REMOTE: ${{ secrets.INFOMANIAK_REMOTE_PATH }}
        run: |
          # Force permissions 644 sur tous les fichiers avant upload pour
          # qu'Apache (user différent du SFTP) puisse les lire côté prod.
          chmod -R a+r .
          find . -type f -not -path "./.git/*" -exec chmod 644 {} \;
          find . -type d -not -path "./.git/*" -exec chmod 755 {} \;

          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 5;
            set net:timeout 60;
            set mirror:parallel-transfer-count 1;
            open -u $USER,$PASS sftp://$HOST;
            echo '--- Nuke complet du dossier icons/ (contenu corrompu côté remote) ---';
            rm -rf $REMOTE/icons;
            echo '--- Dossier icons/ supprimé, le mirror va le recréer ---';
            mirror --reverse --delete --verbose \
              --allow-chown \
              --allow-suid \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.gitignore$ \
              --exclude ^README\.md$ \
              --exclude ^libs/README\.md$ \
              --exclude ^fonts/README\.md$ \
              --exclude ^\.user\.ini$ \
              --exclude ^\.infomaniak \
              ./ $REMOTE;
            echo '--- Listing complet icons/ (fichiers cachés inclus) ---';
            cls -la $REMOTE/icons/;
            echo '--- Recherche .htaccess ou fichiers cachés dans icons/ ---';
            glob -- rm -f $REMOTE/icons/.htaccess;
            glob -- rm -f $REMOTE/icons/.DS_Store;
            glob -- rm -f $REMOTE/icons/.user.ini;
            echo '--- Après nettoyage ---';
            cls -la $REMOTE/icons/;
            chmod 755 $REMOTE/icons;
            chmod 644 $REMOTE/icons/icon-72.png;
            chmod 644 $REMOTE/icons/icon-96.png;
            chmod 644 $REMOTE/icons/icon-128.png;
            chmod 644 $REMOTE/icons/icon-144.png;
            chmod 644 $REMOTE/icons/icon-152.png;
            chmod 644 $REMOTE/icons/icon-192.png;
            chmod 644 $REMOTE/icons/icon-384.png;
            chmod 644 $REMOTE/icons/icon-512.png;
            chmod 644 $REMOTE/icons/icon.svg;
            quit;
          "
          echo "Déploiement terminé"
